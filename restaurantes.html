color:white;padding:30px 20px;text-align:center;
position:relative;
}
.lang{position:absolute;top:12px;right:12px}
.lang button{border:0;background:white;border-radius:999px;padding:7px;margin-left:4px;cursor:pointer}
.container{max-width:900px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:1fr;gap:14px}

.card{background:white;padding:16px;border-radius:16px;box-shadow:0 8px 20px rgba(0,0,0,.06)}
.topline{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.name{font-size:18px;font-weight:800}
.score{background:#ecfdf5;color:#065f46;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:bold}
.badge{display:inline-block;background:#f1f5f9;padding:4px 8px;border-radius:999px;font-size:12px;margin-right:6px}
.comment{margin-top:10px;font-style:italic;color:#444}
.btn{display:block;margin-top:12px;background:#0f766e;color:white;text-align:center;padding:12px;border-radius:10px;text-decoration:none;font-weight:bold}
</style>
</head>

function emoji(tipo){
tipo = String(tipo || "").toLowerCase();

if(tipo.includes("pizza")) return "🍕";
if(tipo.includes("pescado")) return "🐟";
if(tipo.includes("hamburg")) return "🍔";
if(tipo.includes("cafe")) return "☕";
if(tipo.includes("copas")) return "🍹";
if(tipo.includes("bodega")) return "🍷";
if(tipo.includes("carne")) return "🥩";
if(tipo.includes("tapas")) return "🍤";
if(tipo.includes("indio")) return "🍛";
if(tipo.includes("arroc")) return "🥘";
if(tipo.includes("local")) return "🏠";

return "🍽️";
}

function comentarioTraducido(texto){
return comentariosTraducidos[lang]?.[texto] || texto;
}

function setLang(l){
lang=l;
render();
}

function render(){
const t=T[lang];

document.documentElement.lang=lang;
document.getElementById("title").innerText=t.title;
document.getElementById("subtitle").innerText=t.sub;

const cont=document.getElementById("content");
cont.innerHTML="";

RESTAURANTES.forEach(r=>{
cont.innerHTML += `
<div class="card">
  <div class="topline">
    <div class="name">${emoji(r.tipo)} ${r.nombre}</div>
    <div class="score">${r.calidad}/10</div>
  </div>

  <div>
    <span class="badge">${r.tipo}</span>
    <span class="badge">${t.good}</span>
  </div>

  <div class="comment">"${comentarioTraducido(r.comentario)}"</div>

  <a class="btn" href="${r.link}" target="_blank">
    ${t.maps}
  </a>
</div>
`;
});
}

render();
